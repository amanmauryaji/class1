       input:disabled{
        background-color: #9d5f5f;
       }
       input{
        border: 2px solid #144268;
       }
       input:focus{
        background-color: aqua;
       }
       p::first-letter{
        font-size: 30px;
       }
       p::first-line{
        background-color: #5c2094;
        font-size: x-small;
       }
       input:focus:required{
        background-color: rgb(3, 45, 15);
        color: #7ebe92;
       }
       input:required{
        background-color: aquamarine;
       }
       a{
        text-decoration: none;
        color: #5c2094;
       }
       a:active{
        color: #144268;
       }
       a:visited{
        color: chocolate;
       }
    </style>
  </head>
