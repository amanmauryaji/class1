<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image in Text</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        overflow: hidden;
      }
      body {
        /* background-image: url("class1/Flag_of_India.svg.webp"); */
        /* background-repeat: no-repeat;
            background-size: cover; */
        color: aliceblue;
        background-color: black;
        height: 100vh;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      p {
        font-size: 100px;
        font-weight: bolder;
        background-image: url("./Flag_of_India.svg.webp");
        background-repeat: no-repeat;
        background-position: center;
        background-size: 100% 100%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
  </head>
  <body>
    <p>I AM A INDIAN</p>
  </body>
</html>
