<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: #050112;
            color: aliceblue;
        }
        .d1{
            width: 200px;
            height: 200px;
            background-color: aqua;
        }
        .d1:hover{
            width: 300px;
            height: 300px;
            background-color: aquamarine;
        }
            ul>li:first-child{
                background-color: #3c0520;
            }
            ul>li:last-child{
                background-color: #022a2a;
            }
            ul>li:nth-child(2/* value is a odd even and a number */){
                background-color: #0f0f6b;
            }
            ul>li:nth-child(odd){
                background-color: #02290e;
            }
    </style>
</head>
<body>
    <div class="d1">

    </div>
    <ul>
        <li>Paneer </li>
        <li>Kadhi Paneer</li>
        <li>Daal fry</li>
        <li>Rice</li>
        <!-- <li>lorem Somthing</li> -->
    </ul>
</body>
</html>
